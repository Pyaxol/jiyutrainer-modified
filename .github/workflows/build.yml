name: Build JiYuTrainer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-2019  # 改为 windows-2019，它包含 VS 2017 工具集

    steps:
    - uses: actions/checkout@v4  # 升级到 v4
    
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '16.0'  # 指定使用 VS 2019（兼容 v141/v142 工具集）
    
    - name: Build Solution
      run: |
        # 尝试用 v141 工具集编译（v141 兼容 v145）
        msbuild JiYuTrainer.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v141
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: JiYuTrainer-Build
        path: |
          **/Release/
          **/x64/Release/
          !**/obj/
          !**/Debug/
